[settings]
experimental = true
pin = true
minimum_release_age = "3d"
lockfile = true

[tools]
"aqua:anomalyco/opencode" = "1.18.2"
"aqua:anthropics/claude-code" = "2.1.211"
"aqua:bats-core/bats-core" = "1.13.0"
"aqua:dprint/dprint" = "0.55.1"
"aqua:earendil-works/pi" = "0.80.7"
"aqua:jdx/hk" = "1.48.0"
"core:go" = "1.26.4"
"core:bun" = "1.3.14"
"aqua:golangci/golangci-lint" = "2.12.2"
"aqua:goreleaser/goreleaser" = "2.14.3"
"aqua:openai/codex" = "0.143.0"
# OMP 17.0.1 is published as a Bun executable (engines.bun >=1.3.14).
"npm:@oh-my-pi/pi-coding-agent" = "17.0.1"

[deps.go]
auto = true

[tasks.build]
run = "go build ./cmd/agent-api-gateway"

[tasks.serve]
run = "go run ./cmd/agent-api-gateway serve"

[tasks."test:unit"]
run = "go test ./..."

[tasks."test:race"]
run = "go test -race ./..."

[tasks."test:clients"]
description = "Run deterministic external-client compatibility tests"
run = "bats --timing tests/client-compat"

[tasks.test]
depends = ["test:unit", "check"]

[tasks.check]
run = "hk check --all"

[tasks.fix]
run = "hk fix --all"

[tasks."release:snapshot"]
description = "Build a release snapshot with GoReleaser"
run = "goreleaser release --snapshot --clean --skip=sign,docker"

[hooks]
postinstall = ["hk install --mise"]
