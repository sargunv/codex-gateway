[settings]
experimental = true
pin = true
minimum_release_age = "3d"
lockfile = true

[tools]
"aqua:dprint/dprint" = "0.55.1"
"aqua:jdx/hk" = "1.48.0"
"core:go" = "1.26.4"
"aqua:golangci/golangci-lint" = "2.12.2"
"aqua:goreleaser/goreleaser" = "2.14.3"

[deps.go]
auto = true

[tasks.build]
run = "go build ."

[tasks.serve]
run = "go run . serve"

[tasks.check]
run = "hk check --all"

[tasks.fix]
run = "hk fix --all"

[tasks."release:snapshot"]
description = "Build a release snapshot with GoReleaser"
run = "goreleaser release --snapshot --clean --skip=sign"

[hooks]
postinstall = ["hk install --mise"]
